#===============================================================================
#  TX Configuration File — ~/.tx/config
#===============================================================================

# ── General ──────────────────────────────────────────────────────────────────
TX_JSON=false           # JSON output mode
TX_VERBOSE=false        # Verbose logging
TX_FORCE=false          # Force mode (skip confirmations)
TX_NO_COLOR=false       # Disable colors
TX_EDITOR=nano          # Default editor

# ── Paths ────────────────────────────────────────────────────────────────────
TX_CACHE_DIR="${HOME}/.tx/cache"
TX_LOG_DIR="${HOME}/.tx/logs"
TX_BACKUP_DIR="${HOME}/.tx/backups"
TX_TASKS_DIR="${HOME}/.tx/tasks"

# ── Network ──────────────────────────────────────────────────────────────────
TX_TIMEOUT=10           # Default timeout in seconds
TX_USER_AGENT="TX-CLI/2.0 (Termux eXecutive)"
TX_DNS_SERVER="1.1.1.1"
TX_PROXY=""             # HTTP proxy (e.g., socks5://127.0.0.1:9050)

# ── Scanning ─────────────────────────────────────────────────────────────────
TX_SCAN_PORTS="21,22,23,25,53,80,110,143,443,445,993,995,1433,1521,2049,3306,3389,5432,5900,6379,8080,8443,27017"
TX_SCAN_TIMEOUT=3

# ── OSINT ────────────────────────────────────────────────────────────────────
# SHODAN_API_KEY=""     # Set your Shodan API key here

# ── Payloads ─────────────────────────────────────────────────────────────────
TX_PAYLOAD_DIR="${HOME}/.tx/payloads"
TX_LHOST=""             # Default listen host
TX_LPORT="4444"         # Default listen port

# ── Anonymity ────────────────────────────────────────────────────────────────
TX_TOR_PORT=9050        # Tor SOCKS port
TX_TOR_CTRL_PORT=9051   # Tor control port

# ── Phishing ─────────────────────────────────────────────────────────────────
TX_PHISH_PORT=8080      # Default phishing server port

# ── Theme ────────────────────────────────────────────────────────────────────
TX_THEME="default"      # Default theme
TX_FONT=""              # Default font

# ── Automation ───────────────────────────────────────────────────────────────
TX_MONITOR_INTERVAL=3   # Monitor refresh interval (seconds)
TX_WATCH_INTERVAL=2     # Watch refresh interval (seconds)
